<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<div th:replace="~{fragment :: meta}"></div>

	<div th:replace="~{fragment :: styles}"></div>

	<title>予約一覧</title>
</head>

<body>
	<div class="nagoyameshi-wrapper">
		<div th:replace="~{fragment :: header}"></div>

		<main>
			<div class="container py-4 nagoyameshi-container">
				<div class="row justify-content-center">
					<div th:replace="~{fragment :: sidebar}"></div>

					<div class="col container">
						<div class="row justify-content-center">
							<div class="col-xxl-9 col-xl-10 col-lg-11">
								<h1 class="mb-4 text-center">予約一覧</h1>

								<div th:if="${successMessage}" class="alert alert-info">
									<span th:text="${successMessage}"></span>
								</div>

								<div th:if="${errorMessage}" class="alert alert-danger">
									<span th:text="${errorMessage}"></span>
								</div>

								<div class="d-flex justify-content-between align-items-end flex-wrap w-100">
									<form method="get" th:action="@{/admin/reservations}"
										class="nagoyaemshi-admin-search-box mb-3 w-100">
										<div class="d-flex align-items-center gap-2 flex-nowrap">

											<input type="text" class="form-control" name="keyword" th:value="${keyword}"
												placeholder="店舗名で検索" style="min-width: 150px; flex-grow: 1;">

											<input type="date" name="startDate" th:value="${startDate}"
												class="form-control" style="width: 150px; flex-shrink: 0;">

											<span class="mx-1" style="flex-shrink: 0;">～</span>

											<input type="date" name="endDate" th:value="${endDate}" class="form-control"
												style="width: 150px; flex-shrink: 0;">

											<!-- 検索ボタン -->
											<button type="submit" class="btn text-white shadow-sm nagoyameshi-btn ms-1"
												style="flex-shrink: 0;">検索</button>

											<!-- ダウンロードボタン -->
											<button type="submit" th:formaction="@{/admin/reservations/download}"
												class="btn btn-outline-secondary ms-1" style="flex-shrink: 0;">
												ダウンロード
											</button>

										</div>
									</form>
								</div>

								<div>
									<p class="mb-0"
										th:text="${'計' + #numbers.formatInteger(reservationPage.getTotalElements(), 1, 'COMMA') + '件'}">
									</p>
								</div>

								<table class="table table-hover">
									<thead>
										<tr>
											<th scope="col">予約ID</th>
											<th scope="col">ユーザー</th>
											<th scope="col">店舗名</th>
											<th scope="col">予約日時</th>
											<th scope="col">人数</th>
											<th scope="col">予約作成日</th>
											<th scope="col">最終編集日</th>
										</tr>
									</thead>
									<tbody>
										<tr th:each="reservation : ${reservationPage}">
											<td th:text="${reservation.id}"></td>
											<td
												th:text="${reservation.user != null ? reservation.user.name : '退会済みユーザー'}">
											</td>
											<td
												th:text="${reservation.restaurant != null ? reservation.restaurant.name : '削除された店舗'}">
											</td>
											<td
												th:text="${reservation.reservedDatetime != null ? #temporals.format(reservation.reservedDatetime, 'yyyy年M月d日 H時mm分') : ''}">
											</td>
											<td
												th:text="${reservation.numberOfPeople != null ? reservation.numberOfPeople + '名' : ''}">
											</td>
											<td
												th:text="${reservation.createdAt != null ? #dates.format(reservation.createdAt, 'yyyy年M月d日 H時mm分') : ''}">
											</td>
											<td
												th:text="${reservation.updatedAt != null ? #dates.format(reservation.updatedAt, 'yyyy年M月d日 H時mm分') : ''}">
											</td>
										</tr>
									</tbody>
								</table>

								<!-- ページネーション -->
								<div th:if="${reservationPage.getTotalPages() > 1}"
									class="d-flex justify-content-center">
									<nav aria-label="予約一覧ページ">
										<ul class="pagination">

											<!-- 前へボタン (‹) -->
											<li class="page-item">
												<span th:if="${reservationPage.isFirst()}"
													class="page-link disabled">‹</span>
												<!-- 期間検索の条件を引き継ぐように修正 -->
												<a th:unless="${reservationPage.isFirst()}"
													th:href="@{/admin/reservations(page = ${reservationPage.getNumber() - 1}, startDate = ${startDate}, endDate = ${endDate})}"
													class="page-link nagoyameshi-page-link">‹</a>
											</li>

											<!-- ページ番号ボタン（現在のページの前後3ページのみ表示するように制限して横長を防ぐ） -->
											<li th:each="i : ${#numbers.sequence(0, reservationPage.getTotalPages() - 1)}"
												th:if="${i >= reservationPage.getNumber() - 3 and i <= reservationPage.getNumber() + 3}"
												class="page-item">

												<!-- 現在のページ -->
												<span th:if="${i == reservationPage.getNumber()}"
													class="page-link active nagoyameshi-active"
													th:text="${i + 1}"></span>

												<!-- 他のページ（期間検索の条件を引き継ぐように修正） -->
												<a th:unless="${i == reservationPage.getNumber()}"
													th:href="@{/admin/reservations(page = ${i}, startDate = ${startDate}, endDate = ${endDate})}"
													class="page-link nagoyameshi-page-link" th:text="${i + 1}"></a>
											</li>

											<!-- 次へボタン (›) -->
											<li class="page-item">
												<span th:if="${reservationPage.isLast()}"
													class="page-link disabled">›</span>
												<!-- 期間検索の条件を引き継ぐように修正 -->
												<a th:unless="${reservationPage.isLast()}"
													th:href="@{/admin/reservations(page = ${reservationPage.getNumber() + 1}, startDate = ${startDate}, endDate = ${endDate})}"
													class="page-link nagoyameshi-page-link">›</a>
											</li>

										</ul>
									</nav>
								</div>

							</div>
						</div>
					</div>
				</div>
			</div>
		</main>

		<div th:replace="~{fragment :: footer}"></div>
	</div>

	<div th:replace="~{fragment :: scripts}"></div>
</body>


</html>
